        {"@type":"Question","name":"My child already has a chess coach. Why should I switch?","acceptedAnswer":{"@type":"Answer","text":"We start with a diagnostic that identifies your child's specific gaps — calculation depth, attention decay, emotional response to losing — and build a programme around them. If your child has been stuck at the same rating for 3+ months, the issue is usually structural, not effort."}},
