name = "chesswize-lead-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Don't deploy a workers.dev subdomain — this worker only serves
# chesswize.in/api/* and the routes block below is the sole entry.
workers_dev = false

# Route the worker under chesswize.in/api/* — same-origin, no CORS needed
[[routes]]
pattern = "chesswize.in/api/*"
zone_name = "chesswize.in"

[[routes]]
pattern = "www.chesswize.in/api/*"
zone_name = "chesswize.in"

# Observability
[observability]
enabled = true

# ── Environment variables (set via `wrangler secret put <NAME>` in production) ──
# Required for Zoho CRM integration. Absent values → worker falls back to
# email-only notification or returns a neutral success (no CRM push).
#
#   ZOHO_CLIENT_ID          — from api-console.zoho.com (Self-Client)
#   ZOHO_CLIENT_SECRET      — same
#   ZOHO_REFRESH_TOKEN      — one-time generated via grant-token exchange
#   ZOHO_ACCOUNTS_URL       — e.g. https://accounts.zoho.in (India DC)
#   ZOHO_API_DOMAIN         — e.g. https://www.zohoapis.in
#
# Required for Resend email notifications:
#   RESEND_API_KEY          — from resend.com/api-keys
#   NOTIFY_EMAIL            — internal inbox that receives new-lead emails
#   FROM_EMAIL              — verified sender, e.g. "ChessWize <noreply@chesswize.com>"
#
# Required for Meta Conversions API (server-side Lead events):
#   META_CAPI_TOKEN         — Events Manager → Pixel → Conversions API →
#                              "Generate Access Token". Never commit.
#   META_TEST_EVENT_CODE    — OPTIONAL, only during QA. Copy from Events
#                              Manager → Test Events. Remove in production.
#
# Required for Cloudflare Turnstile anti-spam:
#   TURNSTILE_SECRET_KEY    — dash.cloudflare.com → Turnstile → site → Secret
#                              Key. Absent → verification skipped (dev only).
#                              Client-side site key is injected via Vite at
#                              build time: set VITE_TURNSTILE_SITE_KEY in the
#                              landing-page build env (defaults to Cloudflare's
#                              always-passes test key 1x00000000000000000000AA
#                              when unset, so dev + staging still work).
#
# Optional:
#   ALLOWED_ORIGINS         — comma-separated (default: chesswize.in,www.chesswize.in)

# Public non-secret defaults — safe to commit
[vars]
# Current Resend key is send-only + account in sandbox mode: from onboarding@resend.dev
# can ONLY deliver to the Resend account's own email (support@chesswize.com).
# To unlock sending to any address:
#   1) Create a new Resend API key with full access (not "send-only")
#   2) Visit https://resend.com/domains, add chesswize.com, copy the DNS records
#   3) Share DNS records with me → I'll wire them via Cloudflare API
#   4) Once verified, switch FROM_EMAIL → "ChessWize <noreply@chesswize.com>"
#      and NOTIFY_EMAIL → whatever inbox you want lead emails at
FROM_EMAIL = "ChessWize <noreply@updates.chesswize.in>"
# Comma-separated list — each recipient is sent in parallel as an independent
# email. A failure for one doesn't block the others.
NOTIFY_EMAIL = "support@chesswize.com,chesswize79@gmail.com"
ALLOWED_ORIGINS = "chesswize.in,www.chesswize.in,localhost"

# Meta Pixel ID — public, safe to commit. Matches fbq('init', ...) in index.html.
META_PIXEL_ID = "1315250227040245"
