name: Deploy Worker

# Deploy the chesswize-lead-api Cloudflare Worker on every push to main
# that touches worker/. Closes the loophole where anyone with the broad
# CHESSWIZE_CLOUDFLARE_API_TOKEN could `wrangler deploy` from a laptop
# with no code review.
#
# Auth: CLOUDFLARE_API_TOKEN repo secret holds a token scoped to
# Workers Scripts/Routes Write + KV Write + D1 Write on the
# chesswize-lead-api worker's account (70d0ee...). The legacy broad
# token still exists for ops scripts; rotate it once CI is proven.
#
# Manual emergency deploys remain possible via `workflow_dispatch`
# below — pick a commit and run, no extra approval required.

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

# Cancel in-flight deploys when a newer commit lands — last commit wins.
concurrency:
  group: deploy-worker
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2'

      - name: Install worker deps
        working-directory: worker
        run: bun install --frozen-lockfile

      - name: Type-check
        working-directory: worker
        run: bunx tsc --noEmit

      - name: Deploy via wrangler
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 70d0ee8013c904f1c8b87a4529ceebba
        run: bunx wrangler@4 deploy
